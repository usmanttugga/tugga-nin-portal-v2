<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#064e3b"/>
  
  <!-- Octagonal border with nodes -->
  <path d="M 100 50 L 300 50 L 350 100 L 350 300 L 300 350 L 100 350 L 50 300 L 50 100 Z" 
        fill="none" stroke="url(#borderGradient)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Corner nodes -->
  <circle cx="100" cy="50" r="7" fill="#10b981" filter="url(#glow)"/>
  <circle cx="300" cy="50" r="7" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="350" cy="100" r="7" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="350" cy="300" r="7" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="300" cy="350" r="7" fill="#10b981" filter="url(#glow)"/>
  <circle cx="100" cy="350" r="7" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="50" cy="300" r="7" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="50" cy="100" r="7" fill="#10b981" filter="url(#glow)"/>
  
  <!-- WiFi/Signal icon -->
  <path d="M 200 95 Q 225 85 250 95" fill="none" stroke="#34d399" stroke-width="3" opacity="0.8"/>
  <path d="M 200 110 Q 220 100 240 110" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.8"/>
  <path d="M 200 125 Q 215 117 230 125" fill="none" stroke="#10b981" stroke-width="3" opacity="0.8"/>
  <circle cx="215" cy="135" r="5" fill="#06b6d4" opacity="0.8"/>
  
  <!-- Code brackets -->
  <text x="145" y="110" font-family="monospace" font-size="26" fill="#34d399" opacity="0.7">&lt;/&gt;</text>
  
  <!-- Binary decorations -->
  <text x="65" y="175" font-family="monospace" font-size="11" fill="#10b981" opacity="0.4">01</text>
  <text x="65" y="190" font-family="monospace" font-size="11" fill="#06b6d4" opacity="0.4">10</text>
  <text x="320" y="175" font-family="monospace" font-size="11" fill="#0ea5e9" opacity="0.4">10</text>
  <text x="320" y="190" font-family="monospace" font-size="11" fill="#22d3ee" opacity="0.4">01</text>
  
  <!-- Side tech nodes -->
  <rect x="75" y="205" width="35" height="35" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <circle cx="82" cy="212" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="103" cy="212" r="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="82" cy="233" r="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="103" cy="233" r="3" fill="#10b981" opacity="0.6"/>
  
  <rect x="290" y="205" width="35" height="35" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <circle cx="297" cy="212" r="3" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="318" cy="212" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="297" cy="233" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="318" cy="233" r="3" fill="#0ea5e9" opacity="0.6"/>
  
  <!-- Large T letter with gradient -->
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="95" font-weight="bold" 
        fill="url(#emeraldGradient)" text-anchor="middle" filter="url(#glow)">T</text>
  
  <!-- TUGGA text -->
  <text x="200" y="255" font-family="Arial, sans-serif" font-size="38" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" letter-spacing="9">TUGGA</text>
  
  <!-- Divider line with nodes -->
  <line x1="115" y1="270" x2="285" y2="270" stroke="url(#borderGradient)" stroke-width="2"/>
  <circle cx="115" cy="270" r="4" fill="#10b981"/>
  <circle cx="285" cy="270" r="4" fill="#06b6d4"/>
  
  <!-- IT SOLUTIONS text -->
  <text x="200" y="295" font-family="Arial, sans-serif" font-size="21" font-weight="normal" 
        fill="#34d399" text-anchor="middle" letter-spacing="7">IT SOLUTIONS</text>
  
  <!-- Tagline -->
  <path id="curve" d="M 95 325 Q 200 345 305 325" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="15" fill="#a7f3d0" font-style="italic">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">
      Where Vision Meets Technology
    </textPath>
  </text>
</svg>
