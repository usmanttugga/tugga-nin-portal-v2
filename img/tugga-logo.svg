<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a1a"/>
  
  <!-- Octagonal border with nodes -->
  <path d="M 100 50 L 300 50 L 350 100 L 350 300 L 300 350 L 100 350 L 50 300 L 50 100 Z" 
        fill="none" stroke="url(#borderGradient)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Corner nodes -->
  <circle cx="100" cy="50" r="6" fill="#8b9eff" filter="url(#glow)"/>
  <circle cx="300" cy="50" r="6" fill="#8b9eff" filter="url(#glow)"/>
  <circle cx="350" cy="100" r="6" fill="#b8a0ff" filter="url(#glow)"/>
  <circle cx="350" cy="300" r="6" fill="#b8a0ff" filter="url(#glow)"/>
  <circle cx="300" cy="350" r="6" fill="#b8a0ff" filter="url(#glow)"/>
  <circle cx="100" cy="350" r="6" fill="#b8a0ff" filter="url(#glow)"/>
  <circle cx="50" cy="300" r="6" fill="#8b9eff" filter="url(#glow)"/>
  <circle cx="50" cy="100" r="6" fill="#8b9eff" filter="url(#glow)"/>
  
  <!-- WiFi icon -->
  <path d="M 200 100 Q 220 90 240 100" fill="none" stroke="#8b9eff" stroke-width="3" opacity="0.7"/>
  <path d="M 200 115 Q 215 107 230 115" fill="none" stroke="#8b9eff" stroke-width="3" opacity="0.7"/>
  <path d="M 200 130 Q 210 124 220 130" fill="none" stroke="#8b9eff" stroke-width="3" opacity="0.7"/>
  <circle cx="210" cy="140" r="4" fill="#8b9eff" opacity="0.7"/>
  
  <!-- Code brackets -->
  <text x="150" y="110" font-family="monospace" font-size="24" fill="#8b9eff" opacity="0.6">&lt;/&gt;</text>
  
  <!-- Binary decorations -->
  <text x="70" y="180" font-family="monospace" font-size="10" fill="#8b9eff" opacity="0.3">01</text>
  <text x="70" y="195" font-family="monospace" font-size="10" fill="#8b9eff" opacity="0.3">10</text>
  <text x="320" y="180" font-family="monospace" font-size="10" fill="#b8a0ff" opacity="0.3">10</text>
  <text x="320" y="195" font-family="monospace" font-size="10" fill="#b8a0ff" opacity="0.3">01</text>
  
  <!-- Side tech nodes -->
  <rect x="80" y="210" width="30" height="30" fill="none" stroke="#8b9eff" stroke-width="2" opacity="0.5"/>
  <circle cx="85" cy="215" r="3" fill="#8b9eff" opacity="0.5"/>
  <circle cx="105" cy="215" r="3" fill="#8b9eff" opacity="0.5"/>
  <circle cx="85" cy="235" r="3" fill="#8b9eff" opacity="0.5"/>
  <circle cx="105" cy="235" r="3" fill="#8b9eff" opacity="0.5"/>
  
  <rect x="290" y="210" width="30" height="30" fill="none" stroke="#b8a0ff" stroke-width="2" opacity="0.5"/>
  <circle cx="295" cy="215" r="3" fill="#b8a0ff" opacity="0.5"/>
  <circle cx="315" cy="215" r="3" fill="#b8a0ff" opacity="0.5"/>
  <circle cx="295" cy="235" r="3" fill="#b8a0ff" opacity="0.5"/>
  <circle cx="315" cy="235" r="3" fill="#b8a0ff" opacity="0.5"/>
  
  <!-- Large T letter -->
  <defs>
    <linearGradient id="tGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8b8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="90" font-weight="bold" 
        fill="url(#tGradient)" text-anchor="middle" filter="url(#glow)">T</text>
  
  <!-- TUGGA text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" letter-spacing="8">TUGGA</text>
  
  <!-- Divider line with nodes -->
  <line x1="120" y1="265" x2="280" y2="265" stroke="url(#borderGradient)" stroke-width="2"/>
  <circle cx="120" cy="265" r="4" fill="#8b9eff"/>
  <circle cx="280" cy="265" r="4" fill="#b8a0ff"/>
  
  <!-- IT SOLUTIONS text -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="20" font-weight="normal" 
        fill="#8b9eff" text-anchor="middle" letter-spacing="6">IT SOLUTIONS</text>
  
  <!-- Tagline -->
  <path id="curve" d="M 100 320 Q 200 340 300 320" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="14" fill="#9999aa" font-style="italic">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">
      Where Vision Meets Technology
    </textPath>
  </text>
</svg>
