<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5fa8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e8a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5fa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M10 8 L50 4 L90 8 L90 42 Q90 62 50 74 Q10 62 10 42 Z"
        fill="url(#shieldGrad)" filter="url(#glow)"/>
  <!-- Shield inner highlight -->
  <path d="M16 12 L50 8.5 L84 12 L84 42 Q84 59 50 70 Q16 59 16 42 Z"
        fill="url(#shieldGrad2)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Fingerprint lines (stylized) -->
  <g fill="none" stroke="white" stroke-linecap="round" opacity="0.95">
    <!-- Center dot -->
    <circle cx="50" cy="39" r="2.5" fill="white" opacity="0.9"/>
    <!-- Ring 1 -->
    <path d="M44 39 Q44 33 50 33 Q56 33 56 39 Q56 45 50 45 Q44 45 44 39" stroke-width="1.4" opacity="0.9"/>
    <!-- Ring 2 -->
    <path d="M38.5 39 Q38.5 27 50 27 Q61.5 27 61.5 39 Q61.5 51 50 51 Q38.5 51 38.5 39" stroke-width="1.3" opacity="0.8"/>
    <!-- Ring 3 - partial top open -->
    <path d="M33 39 Q33 21 50 21 Q67 21 67 39 Q67 57 50 57 Q33 57 33 39" stroke-width="1.2" opacity="0.7"/>
    <!-- Ring 4 - partial -->
    <path d="M27.5 42 Q28 15 50 15 Q72 15 72.5 42" stroke-width="1.1" opacity="0.55"/>
  </g>

  <!-- Digital dots top-right of shield -->
  <g fill="white" opacity="0.85">
    <rect x="68" y="12" width="3" height="3" rx="0.8"/>
    <rect x="73" y="12" width="3" height="3" rx="0.8"/>
    <rect x="68" y="17" width="3" height="3" rx="0.8"/>
    <rect x="73" y="17" width="2" height="2" rx="0.5" opacity="0.5"/>
  </g>

  <!-- Company name -->
  <text x="102" y="34" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800"
        fill="url(#textGrad)" letter-spacing="-0.5">MAJIA</text>

  <!-- Divider line -->
  <line x1="102" y1="40" x2="308" y2="40" stroke="#1e8a4a" stroke-width="1.2" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="103" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="700"
        fill="#1e8a4a" letter-spacing="2.5">DIGITAL IDENTITY CENTER</text>

  <!-- Tagline -->
  <text x="103" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="400"
        fill="#64748b" letter-spacing="0.3" font-style="italic">Securing Your Identity with Trust and Precision.</text>
</svg>
