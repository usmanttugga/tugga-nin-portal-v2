<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <defs>
    <!-- Shield gradient - blue to green like original -->
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1565c0"/>
      <stop offset="55%"  stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <!-- Shield right half green -->
    <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <!-- Text gradient blue -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <!-- Text gradient green -->
    <linearGradient id="tg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>

  <!-- ── SHIELD ── -->
  <g filter="url(#shadow)">
    <!-- Left half (blue) -->
    <path d="M8 10 L45 5 L45 75 Q8 63 8 42 Z" fill="url(#sg)"/>
    <!-- Right half (green) -->
    <path d="M45 5 L82 10 L82 42 Q82 63 45 75 Z" fill="url(#sg2)"/>
    <!-- Shield border highlight -->
    <path d="M8 10 L45 5 L82 10 L82 42 Q82 65 45 77 Q8 65 8 42 Z"
          fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
    <!-- Inner shine -->
    <path d="M14 14 L45 10 L45 38 Q14 38 14 28 Z" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- ── FINGERPRINT (centered in shield) ── -->
  <g transform="translate(45,41)" fill="none" stroke="white" stroke-linecap="round" filter="url(#glow)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.8" fill="white" opacity="0.95"/>
    <!-- Ring 1 -->
    <path d="M-6,0 Q-6,-6 0,-6 Q6,-6 6,0 Q6,6 0,6 Q-6,6 -6,0" stroke-width="1.6" opacity="0.95"/>
    <!-- Ring 2 -->
    <path d="M-12,0 Q-12,-12 0,-12 Q12,-12 12,0 Q12,12 0,12 Q-12,12 -12,0" stroke-width="1.4" opacity="0.85"/>
    <!-- Ring 3 -->
    <path d="M-18,0 Q-18,-18 0,-18 Q18,-18 18,0 Q18,18 0,18 Q-18,18 -18,0" stroke-width="1.2" opacity="0.7"/>
    <!-- Ring 4 - open top -->
    <path d="M-22,4 Q-22,-22 0,-22 Q22,-22 22,4" stroke-width="1.1" opacity="0.5"/>
  </g>

  <!-- Digital dots (top-right of shield) -->
  <g fill="rgba(255,255,255,0.85)">
    <rect x="66" y="11" width="3.5" height="3.5" rx="1"/>
    <rect x="71.5" y="11" width="3.5" height="3.5" rx="1"/>
    <rect x="66" y="16.5" width="3.5" height="3.5" rx="1"/>
    <rect x="71.5" y="16.5" width="2.5" height="2.5" rx="0.8" opacity="0.5"/>
  </g>

  <!-- ── TEXT ── -->
  <!-- MAJIA -->
  <text x="98" y="40"
        font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="30" font-weight="900"
        fill="url(#tg)"
        letter-spacing="-0.5">MAJIA</text>

  <!-- Separator line -->
  <line x1="98" y1="46" x2="352" y2="46" stroke="#2e7d32" stroke-width="1.5" opacity="0.7"/>

  <!-- DIGITAL IDENTITY CENTER -->
  <text x="99" y="61"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700"
        fill="url(#tg2)"
        letter-spacing="2.8">DIGITAL IDENTITY CENTER</text>

  <!-- Tagline -->
  <text x="99" y="76"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" font-weight="400"
        fill="#546e7a"
        letter-spacing="0.4"
        font-style="italic">Securing Your Identity with Trust and Precision.</text>
</svg>
