<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4fc3f7"/>
      <stop offset="55%"  stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#81c784"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Shield left (blue) -->
  <path d="M8 10 L45 5 L45 75 Q8 63 8 42 Z" fill="url(#sg)" filter="url(#shadow)"/>
  <!-- Shield right (green) -->
  <path d="M45 5 L82 10 L82 42 Q82 63 45 75 Z" fill="url(#sg2)" filter="url(#shadow)"/>
  <!-- Shield border -->
  <path d="M8 10 L45 5 L82 10 L82 42 Q82 65 45 77 Q8 65 8 42 Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>

  <!-- Fingerprint -->
  <g transform="translate(45,41)" fill="none" stroke="white" stroke-linecap="round" filter="url(#glow)">
    <circle cx="0" cy="0" r="2.8" fill="white" opacity="0.95"/>
    <path d="M-6,0 Q-6,-6 0,-6 Q6,-6 6,0 Q6,6 0,6 Q-6,6 -6,0" stroke-width="1.6" opacity="0.95"/>
    <path d="M-12,0 Q-12,-12 0,-12 Q12,-12 12,0 Q12,12 0,12 Q-12,12 -12,0" stroke-width="1.4" opacity="0.85"/>
    <path d="M-18,0 Q-18,-18 0,-18 Q18,-18 18,0 Q18,18 0,18 Q-18,18 -18,0" stroke-width="1.2" opacity="0.7"/>
    <path d="M-22,4 Q-22,-22 0,-22 Q22,-22 22,4" stroke-width="1.1" opacity="0.5"/>
  </g>

  <!-- Digital dots -->
  <g fill="rgba(255,255,255,0.85)">
    <rect x="66" y="11" width="3.5" height="3.5" rx="1"/>
    <rect x="71.5" y="11" width="3.5" height="3.5" rx="1"/>
    <rect x="66" y="16.5" width="3.5" height="3.5" rx="1"/>
    <rect x="71.5" y="16.5" width="2.5" height="2.5" rx="0.8" opacity="0.5"/>
  </g>

  <!-- MAJIA text - white for dark backgrounds -->
  <text x="98" y="40"
        font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="30" font-weight="900"
        fill="white"
        letter-spacing="-0.5">MAJIA</text>

  <!-- Separator -->
  <line x1="98" y1="46" x2="352" y2="46" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>

  <!-- DIGITAL IDENTITY CENTER - light green -->
  <text x="99" y="61"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700"
        fill="#a5d6a7"
        letter-spacing="2.8">DIGITAL IDENTITY CENTER</text>

  <!-- Tagline -->
  <text x="99" y="76"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" font-weight="400"
        fill="rgba(255,255,255,0.6)"
        letter-spacing="0.4"
        font-style="italic">Securing Your Identity with Trust and Precision.</text>
</svg>
