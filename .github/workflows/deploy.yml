name: Test and Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Validate key files exist
        run: |
          test -f index.html && echo "✅ index.html" || exit 1
          test -f user/dashboard.html && echo "✅ user/dashboard.html" || exit 1
          test -f admin/dashboard.html && echo "✅ admin/dashboard.html" || exit 1
          test -f js/firebase-config.js && echo "✅ firebase-config.js" || exit 1
          echo "✅ All files validated"
