<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAJIA DIGITAL IDENTITY – NIN Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    /* Brand */
    .brand {
      background: linear-gradient(135deg, #0f2044 0%, #1a3a6e 60%, #1e5c2a 100%);
      text-align: center;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 90px;
    }
    .brand .logo-icon {
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand .logo-icon img {
      max-width: 100%;
      height: auto;
      max-height: 70px;
      object-fit: contain;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
    }
    .tab-btn {
      flex: 1;
      padding: .85rem;
      background: none;
      border: none;
      font-size: .95rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: color .2s, border-bottom .2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }

    /* Forms */
    .form-wrap { padding: 1.75rem 1.75rem 2rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: .35rem; }
    .field input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: #2563eb; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.8rem; }
    .pw-toggle {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #6b7280;
      padding: 0;
      line-height: 1;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: .8rem;
      color: #2563eb;
      text-decoration: none;
      margin-top: -.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: .75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-primary:disabled { opacity: .65; cursor: not-allowed; }

    .msg {
      margin-top: .9rem;
      padding: .65rem .9rem;
      border-radius: 8px;
      font-size: .85rem;
      display: none;
    }
    .msg.error   { background: #fee2e2; color: #b91c1c; display: block; }
    .msg.success { background: #dcfce7; color: #15803d; display: block; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 16px 48px rgba(0,0,0,.3);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; color: #1e3a5f; margin-bottom: .4rem; }
    .modal p  { font-size: .85rem; color: #6b7280; margin-bottom: 1.2rem; }
    .modal-actions { display: flex; gap: .75rem; margin-top: 1rem; }
    .btn-secondary {
      flex: 1;
      padding: .65rem;
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #e5e7eb; }
  </style>
</head>
<body>

<div class="card">
  <!-- Brand -->
  <div class="brand">
    <div class="logo-icon"><img src="img/logo.svg" alt="MAJIA DIGITAL IDENTITY"/></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn"        onclick="switchTab('register')">Register</button>
  </div>

  <div class="form-wrap">

    <!-- LOGIN -->
    <div id="panel-login" class="tab-panel active">
      <div class="field">
        <label for="l-email">Email Address</label>
        <input type="email" id="l-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="l-pw">Password</label>
        <div class="pw-wrap">
          <input type="password" id="l-pw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw('l-pw', this)" type="button">👁️</button>
        </div>
      </div>
      <a class="forgot-link" onclick="openForgot()">Forgot password?</a>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" class="tab-panel">
      <div class="field">
        <label for="r-name">Full Name</label>
        <input type="text" id="r-name" placeholder="John Doe" />
      </div>
      <div class="field">
        <label for="r-email">Email Address</label>
        <input type="email" id="r-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="r-phone">Phone Number</label>
        <input type="tel" id="r-phone" placeholder="08XXXXXXXXXX" maxlength="11" />
      </div>
      <div class="field">
        <label for="r-pw">Password</label>
        <div class="pw-wrap">
          <input type="password" id="r-pw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw('r-pw', this)" type="button">👁️</button>
        </div>
      </div>
      <div class="field">
        <label for="r-cpw">Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="r-cpw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw('r-cpw', this)" type="button">👁️</button>
        </div>
      </div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Create Account</button>
      <div class="msg" id="msg-register"></div>
    </div>

  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgot-modal">
  <div class="modal">
    <h2>Reset Password</h2>
    <p>Enter your email and we'll send you a reset link.</p>
    <div class="field">
      <label for="f-email">Email Address</label>
      <input type="email" id="f-email" placeholder="you@example.com" />
    </div>
    <div class="msg" id="msg-forgot"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeForgot()">Cancel</button>
      <button class="btn-primary" id="btn-forgot" onclick="doForgot()" style="flex:1">Send Link</button>
    </div>
  </div>
</div>

<!-- Firebase module script -->
<script type="module">
  import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword,
           signInWithEmailAndPassword,
           sendPasswordResetEmail }               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDX31m2k1OOzedDQHAbpvgP15mxLjBRdwc",
    authDomain:        "tugga-nin.firebaseapp.com",
    projectId:         "tugga-nin",
    storageBucket:     "tugga-nin.firebasestorage.app",
    messagingSenderId: "63922868228",
    appId:             "1:63922868228:web:45bfadf123e9b493b82551"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  window._auth        = auth;
  window._db          = db;
  window._signIn      = signInWithEmailAndPassword;
  window._createUser  = createUserWithEmailAndPassword;
  window._getDoc      = getDoc;
  window._doc         = doc;
  window._setDoc      = setDoc;
  window._resetPwd    = sendPasswordResetEmail;
  window._fbReady     = true;
</script>

<!-- Regular script – all onclick handlers live here -->
<script>
  /* ── helpers ─────────────────────────────────────────── */
  function waitFB() {
    return new Promise((resolve, reject) => {
      if (window._fbReady) { resolve(); return; }
      let tries = 0;
      const t = setInterval(() => {
        if (window._fbReady) { clearInterval(t); resolve(); }
        else if (++tries > 50) { clearInterval(t); reject(new Error("Firebase failed to load.")); }
      }, 100);
    });
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + type;
  }

  function clearMsg(id) {
    const el = document.getElementById(id);
    el.textContent = "";
    el.className = "msg";
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? "Please wait…" : label;
  }

  /* ── tab switching ───────────────────────────────────── */
  function switchTab(tab) {
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", (tab === "login" ? i === 0 : i === 1));
    });
    document.getElementById("panel-login").classList.toggle("active", tab === "login");
    document.getElementById("panel-register").classList.toggle("active", tab === "register");
    clearMsg("msg-login");
    clearMsg("msg-register");
  }

  /* ── password toggle ─────────────────────────────────── */
  function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    if (inp.type === "password") {
      inp.type = "text";
      btn.textContent = "🙈";
    } else {
      inp.type = "password";
      btn.textContent = "👁️";
    }
  }

  /* ── forgot modal ────────────────────────────────────── */
  function openForgot() {
    document.getElementById("forgot-modal").classList.add("open");
    clearMsg("msg-forgot");
    document.getElementById("f-email").value = document.getElementById("l-email").value || "";
  }

  function closeForgot() {
    document.getElementById("forgot-modal").classList.remove("open");
  }

  /* ── doLogin ─────────────────────────────────────────── */
  async function doLogin() {
    clearMsg("msg-login");
    const email = document.getElementById("l-email").value.trim();
    const pw    = document.getElementById("l-pw").value;

    if (!email || !pw) { showMsg("msg-login", "Please fill in all fields.", "error"); return; }

    setLoading("btn-login", true, "Sign In");
    try {
      await waitFB();
      const c = await window._signIn(window._auth, email, pw);
      const uid = c.user.uid;

      const snap = await window._getDoc(window._doc(window._db, "users", uid));
      let role = "user";
      let userData = { uid, id: uid, role: "user", name: "", email, wallet: 0 };
      if (snap.exists()) {
        userData = Object.assign({}, snap.data(), { uid });
        role = userData.role || "user";
        // Block suspended users from logging in
        if (userData.status === 'Suspended') {
          setLoading("btn-login", false, "Sign In");
          showMsg("msg-login", "Your account has been suspended. Please contact support.", "error");
          return;
        }
      }
      // Save to localStorage so requireAuth works
      localStorage.setItem("tugga_user", JSON.stringify(userData));
      window.location.href = role === "admin" ? "admin/dashboard.html" : "user/dashboard.html";
    } catch (e) {
      setLoading("btn-login", false, "Sign In");
      showMsg("msg-login", friendlyError(e.code), "error");
    }
  }

  /* ── doRegister ──────────────────────────────────────── */
  async function doRegister() {
    clearMsg("msg-register");
    const name  = document.getElementById("r-name").value.trim();
    const email = document.getElementById("r-email").value.trim();
    const phone = document.getElementById("r-phone").value.trim();
    const pw    = document.getElementById("r-pw").value;
    const cpw   = document.getElementById("r-cpw").value;

    if (!name || !email || !phone || !pw || !cpw) {
      showMsg("msg-register", "Please fill in all fields.", "error"); return;
    }
    if (pw !== cpw) {
      showMsg("msg-register", "Passwords do not match.", "error"); return;
    }
    if (pw.length < 6) {
      showMsg("msg-register", "Password must be at least 6 characters.", "error"); return;
    }

    setLoading("btn-register", true, "Create Account");
    try {
      await waitFB();
      const c   = await window._createUser(window._auth, email, pw);
      const uid = c.user.uid;

      await window._setDoc(window._doc(window._db, "users", uid), {
        uid:       uid,
        id:        uid,
        name:      name,
        email:     email,
        phone:     phone,
        role:      "user",
        createdAt: new Date().toISOString()
      });

      showMsg("msg-register", "Account created! Redirecting…", "success");
      setTimeout(() => { window.location.href = "user/dashboard.html"; }, 1200);
    } catch (e) {
      setLoading("btn-register", false, "Create Account");
      showMsg("msg-register", friendlyError(e.code), "error");
    }
  }

  /* ── doForgot ────────────────────────────────────────── */
  async function doForgot() {
    clearMsg("msg-forgot");
    const email = document.getElementById("f-email").value.trim();
    if (!email) { showMsg("msg-forgot", "Please enter your email.", "error"); return; }

    setLoading("btn-forgot", true, "Send Link");
    try {
      await waitFB();
      const actionCodeSettings = {
        url: window.location.origin + '/tugga-nin/index.html',
        handleCodeInApp: false
      };
      await window._resetPwd(window._auth, email, actionCodeSettings);
      showMsg("msg-forgot", "Reset link sent! Check your inbox.", "success");
      setLoading("btn-forgot", false, "Send Link");
    } catch (e) {
      setLoading("btn-forgot", false, "Send Link");
      showMsg("msg-forgot", friendlyError(e.code), "error");
    }
  }

  /* ── error messages ──────────────────────────────────── */
  function friendlyError(code) {
    const map = {
      "auth/user-not-found":       "No account found with this email.",
      "auth/wrong-password":       "Incorrect password.",
      "auth/invalid-credential":   "Invalid email or password.",
      "auth/email-already-in-use": "This email is already registered.",
      "auth/weak-password":        "Password is too weak.",
      "auth/invalid-email":        "Please enter a valid email address.",
      "auth/too-many-requests":    "Too many attempts. Please try again later.",
      "auth/network-request-failed": "Network error. Check your connection."
    };
    return map[code] || "Something went wrong. Please try again.";
  }
</script>

</body>
</html>
