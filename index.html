<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GET ID FIX – NIN Portal</title>
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #064e3b 0%, #0c4a6e 50%, #075985 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      max-height: 100dvh;
      overflow: hidden;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Brand */
    .brand {
      background: linear-gradient(135deg, #047857 0%, #0891b2 100%);
      text-align: center;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .brand .logo-icon img {
      width: 48px;
      height: 48px;
      display: block;
    }

    .brand-text h1 {
      color: white;
      font-size: 1.15rem;
      font-weight: 800;
      margin: 0 0 0.1rem 0;
      letter-spacing: 0.5px;
    }

    .brand-text p {
      color: rgba(255,255,255,0.85);
      font-size: 0.7rem;
      margin: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #f1f5f9;
      padding: 0.25rem;
      gap: 0.25rem;
      border-radius: 8px;
      margin: 0.6rem 1rem 0;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 0.5rem;
      background: transparent;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #047857, #0891b2);
      color: white;
    }

    /* Forms */
    .form-wrap {
      padding: 0.6rem 1rem 0.8rem;
      overflow-y: auto;
      flex: 1;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .field { margin-bottom: 0.5rem; }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.2rem;
    }

    .field input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .field input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 2px rgba(16,185,129,0.1);
    }

    .field input::placeholder { color: #9ca3af; }

    /* Two-column layout for name fields on register */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.5rem; }
    .pw-toggle {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #6b7280;
      padding: 0;
      line-height: 1;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.75rem;
      color: #2563eb;
      text-decoration: none;
      margin-top: -0.3rem;
      margin-bottom: 0.6rem;
      cursor: pointer;
    }

    .btn-primary {
      width: 100%;
      padding: 0.65rem;
      background: linear-gradient(135deg, #047857, #0891b2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.4rem;
    }

    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 0.4rem;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      display: none;
    }
    .msg.error   { background: #fee2e2; color: #b91c1c; display: block; }
    .msg.success { background: #dcfce7; color: #15803d; display: block; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; color: #065f46; margin-bottom: 0.3rem; }
    .modal p  { font-size: 0.82rem; color: #6b7280; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 0.6rem; margin-top: 0.8rem; }
    .btn-secondary {
      flex: 1;
      padding: 0.6rem;
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Page Loader */
    #pageLoader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6,78,59,0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    #pageLoader.active { display: flex; }
    .loader-ring {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(16,185,129,0.2);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: loaderSpin 0.8s linear infinite;
    }
    .loader-text {
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    @keyframes loaderSpin { to { transform: rotate(360deg); } }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; }
      .container { max-width: 100%; max-height: 100dvh; }
      .card { border-radius: 0; height: 100dvh; }
      .brand { padding: 0.6rem 1rem; }
      .brand .logo-icon img { width: 40px; height: 40px; }
      .brand-text h1 { font-size: 1rem; }
      .tabs { margin: 0.5rem 0.75rem 0; }
      .form-wrap { padding: 0.5rem 0.75rem 0.75rem; }
      .field { margin-bottom: 0.4rem; }
      .field input { padding: 0.5rem 0.65rem; font-size: 0.82rem; }
      .field label { font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <!-- Brand -->
    <div class="brand">
      <div class="logo-icon">
        <img src="img/getidfix-logo.svg" alt="GET ID FIX"/>
      </div>
      <div class="brand-text">
        <h1>GET ID FIX</h1>
        <p>Your Identity, Fixed Fast</p>
      </div>
    </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn"        onclick="switchTab('register')">Register</button>
  </div>

  <div class="form-wrap">

    <!-- LOGIN -->
    <div id="panel-login" class="tab-panel active">
      <div class="field">
        <label for="l-email">Email Address</label>
        <input type="email" id="l-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="l-pw">Password</label>
        <div class="pw-wrap">
          <input type="password" id="l-pw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw('l-pw', this)" type="button">👁️</button>
        </div>
      </div>
      <a class="forgot-link" onclick="openForgotPassword()">Forgot Password?</a>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" class="tab-panel">
      <div class="field-row">
        <div class="field">
          <label for="r-fname">First Name</label>
          <input type="text" id="r-fname" placeholder="John" />
        </div>
        <div class="field">
          <label for="r-lname">Last Name</label>
          <input type="text" id="r-lname" placeholder="Doe" />
        </div>
      </div>
      <div class="field">
        <label for="r-email">Email Address</label>
        <input type="email" id="r-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="r-phone">Phone Number</label>
        <input type="tel" id="r-phone" placeholder="08XXXXXXXXXX" maxlength="11" />
      </div>
      <div class="field-row">
        <div class="field">
          <label for="r-pw">Password</label>
          <div class="pw-wrap">
            <input type="password" id="r-pw" placeholder="••••••••" />
            <button class="pw-toggle" onclick="togglePw('r-pw', this)" type="button">👁️</button>
          </div>
        </div>
        <div class="field">
          <label for="r-cpw">Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="r-cpw" placeholder="••••••••" />
            <button class="pw-toggle" onclick="togglePw('r-cpw', this)" type="button">👁️</button>
          </div>
        </div>
      </div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Create Account</button>
      <div class="msg" id="msg-register"></div>
    </div>

  </div>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotPasswordModal">
  <div class="modal">
    <h2>🔑 Reset Password</h2>
    <p>Enter your email address and we'll help you reset your password.</p>
    <div class="field">
      <label for="forgot-email">Email Address</label>
      <input type="email" id="forgot-email" placeholder="you@example.com" />
    </div>
    <div class="msg" id="msg-forgot"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeForgotPassword()">Cancel</button>
      <button class="btn-primary" id="btn-forgot" onclick="doForgotPassword()" style="flex: 1.5;">Reset Password</button>
    </div>
  </div>
</div>

<!-- Page Loader -->
<div id="pageLoader">
  <div class="loader-ring">
    <img src="img/getidfix-logo.svg" class="loader-logo" alt="Loading..."/>
  </div>
  <span class="loader-text">Please wait...</span>
</div>

<!-- Load app.js for authentication functions -->
<script src="js/app.js"></script>

<!-- NIMC API Integration -->
<script src="js/nimc-api.js"></script>
<script src="js/nimc-integration.js"></script>

<!-- Firebase Services (ES6 Modules) -->
<script type="module">
  import { initializeFirebase, isFirebaseReady } from './js/firebase-config.js';
  import * as authService from './js/auth-service.js';
  import * as databaseService from './js/database-service.js';
  
  // Initialize Firebase on page load
  (async () => {
    try {
      const initialized = await initializeFirebase();
      if (initialized) {
        console.log('✅ Firebase initialized successfully');
        window.firebaseInitialized = true;
      } else {
        console.warn('⚠️ Firebase not configured - using localStorage fallback');
        window.firebaseInitialized = false;
      }
    } catch (error) {
      console.error('❌ Firebase initialization error:', error);
      window.firebaseInitialized = false;
    }
  })();
  
  // Make services available globally
  window.authService = authService;
  window.databaseService = databaseService;
  window.isFirebaseReady = isFirebaseReady;
</script>

<!-- Regular script – all onclick handlers live here -->
<script>
  /* ── helpers ─────────────────────────────────────────── */
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + type;
  }

  function clearMsg(id) {
    const el = document.getElementById(id);
    el.textContent = "";
    el.className = "msg";
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? "Please wait…" : label;
  }

  function showLoader() { document.getElementById('pageLoader').classList.add('active'); }
  function hideLoader() { document.getElementById('pageLoader').classList.remove('active'); }

  /* ── tab switching ───────────────────────────────────── */
  function switchTab(tab) {
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", (tab === "login" ? i === 0 : i === 1));
    });
    document.getElementById("panel-login").classList.toggle("active", tab === "login");
    document.getElementById("panel-register").classList.toggle("active", tab === "register");
    clearMsg("msg-login");
    clearMsg("msg-register");
  }

  /* ── password toggle ─────────────────────────────────── */
  function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    if (inp.type === "password") {
      inp.type = "text";
      btn.textContent = "🙈";
    } else {
      inp.type = "password";
      btn.textContent = "👁️";
    }
  }

  /* ── doLogin ─────────────────────────────────────────── */
  async function doLogin() {
    clearMsg("msg-login");
    const email = document.getElementById("l-email").value.trim();
    const pw    = document.getElementById("l-pw").value;

    if (!email || !pw) { showMsg("msg-login", "Please fill in all fields.", "error"); return; }

    setLoading("btn-login", true, "Sign In");
    showLoader();

    try {
      // Try Firebase Auth first if available
      if (window.firebaseInitialized && window.isFirebaseReady()) {
        try {
          // Login with Firebase
          const firebaseUser = await window.authService.loginWithEmail(email, pw);
          
          // Get user data from Firestore
          const userData = await window.databaseService.getUser(firebaseUser.uid);
          
          if (!userData) {
            throw new Error('User data not found in database');
          }
          
          // Check if account is suspended
          if (userData.status === 'suspended') {
            await window.authService.logout();
            setLoading("btn-login", false, "Sign In");
            hideLoader();
            showMsg("msg-login", "Your account has been suspended. Please contact support.", "error");
            return;
          }
          
          // Store user data in localStorage for quick access
          localStorage.setItem("tuggaNinPortalV2_tugga_user", JSON.stringify(userData));
          
          // Redirect based on role
          window.location.href = userData.role === "admin" ? "admin/dashboard.html" : "user/dashboard.html";
          return;
          
        } catch (firebaseError) {
          console.error('Firebase login error:', firebaseError);
          // Fall through to localStorage fallback
          showMsg("msg-login", firebaseError.message || "Login failed. Please try again.", "error");
          setLoading("btn-login", false, "Sign In");
          hideLoader();
          return;
        }
      }
      
      // Fallback to localStorage authentication
      const result = login(email, pw);

      if (!result) {
        setLoading("btn-login", false, "Sign In");
        hideLoader();
        showMsg("msg-login", "Invalid email or password.", "error");
        return;
      }

      if (result.suspended) {
        setLoading("btn-login", false, "Sign In");
        hideLoader();
        showMsg("msg-login", "Your account has been suspended. Please contact support.", "error");
        return;
      }

      window.location.href = result.role === "admin" ? "admin/dashboard.html" : "user/dashboard.html";
      
    } catch (error) {
      console.error('Login error:', error);
      setLoading("btn-login", false, "Sign In");
      hideLoader();
      showMsg("msg-login", "An error occurred. Please try again.", "error");
    }
  }

  /* ── doRegister ──────────────────────────────────────── */
  async function doRegister() {
    clearMsg("msg-register");
    const fname = document.getElementById("r-fname").value.trim();
    const lname = document.getElementById("r-lname").value.trim();
    const email = document.getElementById("r-email").value.trim();
    const phone = document.getElementById("r-phone").value.trim();
    const pw    = document.getElementById("r-pw").value;
    const cpw   = document.getElementById("r-cpw").value;

    if (!fname || !lname || !email || !phone || !pw || !cpw) {
      showMsg("msg-register", "Please fill in all fields.", "error");
      return;
    }

    if (pw !== cpw) {
      showMsg("msg-register", "Passwords do not match.", "error");
      return;
    }

    if (pw.length < 6) {
      showMsg("msg-register", "Password must be at least 6 characters.", "error");
      return;
    }

    if (phone.length !== 11 || !phone.startsWith("0")) {
      showMsg("msg-register", "Please enter a valid 11-digit phone number.", "error");
      return;
    }

    setLoading("btn-register", true, "Create Account");
    showLoader();

    try {
      // Try Firebase Auth first if available
      if (window.firebaseInitialized && window.isFirebaseReady()) {
        try {
          // Register with Firebase Auth
          const firebaseUser = await window.authService.registerWithEmail(email, pw, fname + " " + lname);
          
          // Create user document in Firestore
          const userData = {
            id: firebaseUser.uid,
            name: fname + " " + lname,
            firstName: fname,
            lastName: lname,
            email: email,
            phone: phone,
            role: "user",
            wallet: 0,
            nin: "",
            registeredAt: new Date().toISOString(),
            status: "active"
          };
          
          await window.databaseService.createUser(firebaseUser.uid, userData);
          
          // Store user data in localStorage for quick access
          localStorage.setItem("tuggaNinPortalV2_tugga_user", JSON.stringify(userData));
          
          showMsg("msg-register", "Account created successfully! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "user/dashboard.html";
          }, 1500);
          return;
          
        } catch (firebaseError) {
          console.error('Firebase registration error:', firebaseError);
          setLoading("btn-register", false, "Create Account");
          hideLoader();
          showMsg("msg-register", firebaseError.message || "Registration failed. Please try again.", "error");
          return;
        }
      }
      
      // Fallback to localStorage registration
      let users = JSON.parse(localStorage.getItem("tuggaNinPortalV2_tugga_all_users") || "[]");
      
      // Check if email already exists
      if (users.find(u => u.email === email)) {
        setLoading("btn-register", false, "Create Account");
        hideLoader();
        showMsg("msg-register", "This email is already registered.", "error");
        return;
      }

      // Create new user
      const newUser = {
        id: Date.now(),
        name: fname + " " + lname,
        firstName: fname,
        lastName: lname,
        email: email,
        phone: phone,
        password: pw,
        role: "user",
        wallet: 0,
        nin: "",
        registeredAt: new Date().toISOString(),
        status: "active"
      };

      // Add to users array
      users.push(newUser);
      localStorage.setItem("tuggaNinPortalV2_tugga_all_users", JSON.stringify(users));

      // Auto-login the new user
      const userForSession = { ...newUser };
      delete userForSession.password; // Don't store password in session
      localStorage.setItem("tuggaNinPortalV2_tugga_user", JSON.stringify(userForSession));

      showMsg("msg-register", "Account created successfully! Redirecting...", "success");
      setTimeout(() => {
        window.location.href = "user/dashboard.html";
      }, 1500);
      
    } catch (error) {
      console.error('Registration error:', error);
      setLoading("btn-register", false, "Create Account");
      hideLoader();
      showMsg("msg-register", "An error occurred. Please try again.", "error");
    }
  }

  /* ── Forgot Password ─────────────────────────────────── */
  function openForgotPassword() {
    document.getElementById("forgotPasswordModal").classList.add("open");
    document.getElementById("forgot-email").value = "";
    clearMsg("msg-forgot");
  }

  function closeForgotPassword() {
    document.getElementById("forgotPasswordModal").classList.remove("open");
    clearMsg("msg-forgot");
  }

  async function doForgotPassword() {
    clearMsg("msg-forgot");
    const email = document.getElementById("forgot-email").value.trim();

    if (!email) {
      showMsg("msg-forgot", "Please enter your email address.", "error");
      return;
    }

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      showMsg("msg-forgot", "Please enter a valid email address.", "error");
      return;
    }

    setLoading("btn-forgot", true, "Reset Password");

    try {
      // Try Firebase Auth password reset first if available
      if (window.firebaseInitialized && window.isFirebaseReady()) {
        try {
          await window.authService.resetPassword(email);
          
          setLoading("btn-forgot", false, "Reset Password");
          showMsg("msg-forgot", "Password reset email sent! Please check your inbox and follow the instructions.", "success");
          
          // Auto-close modal after 5 seconds
          setTimeout(() => {
            closeForgotPassword();
            document.getElementById("l-email").value = email;
            switchTab("login");
          }, 5000);
          return;
          
        } catch (firebaseError) {
          console.error('Firebase password reset error:', firebaseError);
          setLoading("btn-forgot", false, "Reset Password");
          showMsg("msg-forgot", firebaseError.message || "Password reset failed. Please try again.", "error");
          return;
        }
      }
      
      // Fallback to localStorage password reset
      let users = JSON.parse(localStorage.getItem("tuggaNinPortalV2_tugga_all_users") || "[]");
      
      // Check if email exists
      const userIndex = users.findIndex(u => u.email === email);
      
      if (userIndex === -1) {
        setLoading("btn-forgot", false, "Reset Password");
        showMsg("msg-forgot", "No account found with this email address.", "error");
        return;
      }

      // Generate a temporary password
      const tempPassword = "Temp" + Math.random().toString(36).substring(2, 8) + "!";
      
      // Update user's password
      users[userIndex].password = tempPassword;
      localStorage.setItem("tuggaNinPortalV2_tugga_all_users", JSON.stringify(users));

      setLoading("btn-forgot", false, "Reset Password");
      showMsg("msg-forgot", `Password reset successful! Your temporary password is: ${tempPassword}. Please login and change it immediately.`, "success");
      
      // Auto-close modal after 8 seconds
      setTimeout(() => {
        closeForgotPassword();
        // Pre-fill email in login form
        document.getElementById("l-email").value = email;
        switchTab("login");
      }, 8000);
      
    } catch (error) {
      console.error('Password reset error:', error);
      setLoading("btn-forgot", false, "Reset Password");
      showMsg("msg-forgot", "An error occurred. Please try again.", "error");
    }
  }
</script>

</body>
</html>

<!-- deploy trigger v2 -->
